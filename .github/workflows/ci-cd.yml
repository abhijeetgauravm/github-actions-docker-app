name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

  deploy:
  needs: build
  runs-on: ubuntu-latest

  steps:
    - name: Pull Image
      run: docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

    - name: Run Container
      run: |
        docker rm -f flask-app || true
        docker run -d -p 5000:5000 --name flask-app \
        ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

        sleep 5
        docker ps -a

    - name: Check logs
      run: docker logs flask-app
        

    - name: Wait for App
      run: sleep 20

    - name: Check containers
      run: docker ps -a

    - name: Check logs
      run: docker logs flask-app || true

    - name: Test Application
      run: |
        echo "Waiting for app..."
        sleep 10

        for i in {1..5}; do
          echo "Attempt $i"
          curl -v http://localhost:5000 && exit 0
          sleep 5
        done

        echo "FAILED"
        docker ps -a
        docker logs flask-app
        exit 1
      
  notify:
    needs: deploy

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: GitHub Actions Deployment Status
          body: |
            Deployment Status: ${{ job.status }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
